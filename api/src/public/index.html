<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
        }

    body {
        width: 100%;
        min-height: 100vh;

        display: flex;
        justify-content: center;
        align-items: center;

        background-image: url("fundo.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }

    .container {
        width: 550px;
        padding: 40px;
        background: rgba(17, 17, 17, 0.92);
        border-radius: 12px;
        box-shadow:0 0 25px rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(5px);
    }

    h1 {
        text-align: center;
        margin-bottom: 30px;
        color: white;
    }

    .campo {
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-bottom: 8px;
        color: white;
        font-weight: bold;
    }

    input {
        width: 100%;
        padding: 14px;

        border: 1px solid #ac1dd8;
        border-radius: 8px;

        background: #0f172a;
        color: white;

        font-size: 15px;
    }

    input:focus {
        outline: none;
        border-color: #60a5fa;
    }

    button {
        width: 100%;
        padding: 14px;

        border: none;
        border-radius: 8px;

        background: #2563eb;
        color: white;

        font-size: 16px;
        font-weight: bold;

        cursor: pointer;

        transition: 0.3s;
    }

    button:hover {
        background: #f03bf6;
    }

    .resultado {
        margin-top: 25px;

        text-align: center;

        color: white;
        font-size: 20px;
        font-weight: bold;
    }
    </style>
</head>
<body>
    <div class="container">
        <h1>Calculadora IMC</h1>

        <div class="campo">
            <label for="peso">Peso (kg)</label>
            <input type="number" id="peso">
        </div>

        <div class="campo">
            <label for="altura">Altura (m)</label>
            <input type="number" id="altura">
        </div>

        
        <button id="calcular">Calcular IMC</button>

        <div class="resultado" id="resultado">

        </div>
    </div>
<script>
    document.getElementById("calcular").addEventListener("click", async () => {
        const peso = Number(document.getElementById("peso").value )
        const altura = Number(document.getElementById("altura").value)

        try {
            const resposta = await fetch('/api/calcular', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    peso,
                    altura
                })
            })
            const dados = await resposta.json();

            document.getElementById("resultado").innerText =
                dados.data

        } catch (erro) {
            document.getElementById("resultado").innerText =
                "Erro ao conectar com o servidor"
        }
    })

</script>
</body>
</html>
